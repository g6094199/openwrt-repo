name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-openwrt-25.12
          FEEDNAME: custom_feed
          PACKAGES: wg-friendly
          INDEX: 0
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          FEED_DIR: ${{ github.workspace }}
          ARTIFACTS_DIR: ${{ github.workspace }}

      - name: Prepare Feed for Deployment
        run: |
          # Definiere die wichtigsten Ziel-Architekturen von OpenWrt-Routern
          # x86_64 (PC/Server), aarch64_cortex-a53 (Moderne ARM64 Router), mipsel_24kc (Ältere MIPS-Router), arm_cortex-a7_neon (Viele ARMv7 Router)
          ARCHS=("x86_64" "x86_generic" "x86_geode"
            "aarch64_cortex-a53" "aarch64_cortex-a72" "aarch64_generic"
            "arm_cortex-a7_neon" "arm_cortex-a9" "arm_cortex-a9_neon" "arm_cortex-a9_vfpv3" "arm_cortex-a15_neon"
            "arm_arm1176jzf-s_vfp" "arm_arm926ej-s" "arm_fa526" "arm_mpcore" "arm_v7_vfp"
            "mipsel_24kc" "mipsel_74kc" "mipsel_mips32" "mips_24kc" "mips_74kc" "mips_mips32"
            "powerpc_464fp" "powerpc_85xx" "arc_arc700" "arc_archs" "riscv64_rv64imafdc_lp64d"
          )

          # 1. Temporären Ordner für das saubere Paket erstellen
          mkdir -p tmp_feed
          
          # 2. Kopiere die vom SDK gebauten Originaldateien in den Temp-Ordner
          find . -type f -name "*.apk" -exec cp {} tmp_feed/ \;
          find . -type f -name "APKINDEX.*" -exec cp {} tmp_feed/ \;

          # Sicherheitsprüfung
          if [ -z "$(ls -A tmp_feed)" ]; then
            echo "Fehler: Keine Pakete vom SDK generiert!"
            exit 1
          fi

          # 3. SPIEGELN: Kopiere den Temp-Ordner in alle Architekturpfade
          for ARCH in "${ARCHS[@]}"; do
            echo "Erstelle konformen OpenWrt-Pfad für Architektur: $ARCH"
            mkdir -p "deploy/packages/$ARCH/custom_feed"
            cp -v tmp_feed/* "deploy/packages/$ARCH/custom_feed/"
          done
          
          rm -rf tmp_feed

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true
