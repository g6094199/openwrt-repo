Der Fehler /entrypoint.sh: line 8: cd: /home/build/openwrt/: No such file or directory liegt an einer Eigenheit der offiziellen GitHub-Action openwrt/gh-action-sdk. Diese Docker-Umgebung ist extrem strikt: Sie erwartet, dass der gesamte SDK-Workspace an einen ganz bestimmten Pfad gemountet wird, andernfalls bricht das interne Docker-Einstiegsskript ab.
Um dieses Problem endgültig zu lösen, nutzen wir einen simplen Trick: Wir wechseln zu der populären und moderneren Alternative sbwml/openwrt-gh-action-sdk. Diese Version fängt Pfadfehler automatisch ab, ist wesentlich flexibler für Custom-Feeds konfiguriert und optimiert für OpenWrt 25.12. 
Ersetze den Inhalt deiner .github/workflows/build-feed.yml durch diesen komplett überarbeiteten Workflow:
yaml

name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Build and Sign Packages via OpenWrt SDK
        # Wechsel auf die robustere SDK-Action, die Pfad-Fehler abfängt
        uses: sbwml/openwrt-gh-action-sdk@v1
        env:
          ARCH: x86_64-25.12.4
          FEEDNAME: custom_feed
          # Das SDK liest deinen lokalen Ordner (net/wg-friendly) automatisch ein
          PACKAGES: wg-friendly
          INDEX: 1
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}

      - name: Prepare Feed for Deployment
        run: |
          mkdir -p deploy/packages/noarch
          
          # Die Action legt die fertigen apk-Dateien standardmäßig in bin/packages/ ab
          echo "Suche nach gebauten APK-Dateien..."
          find bin/packages/ -type f -name "*.apk" -exec cp -v {} deploy/packages/noarch/ \;
          find bin/packages/ -type f -name "APKINDEX.*" -exec cp -v {} deploy/packages/noarch/ \;
          
          # Sicherheitsprüfung, falls der Build fehlgeschlagen sein sollte
          if [ -z "$(ls -A deploy/packages/noarch)" ]; then
            echo "Fehler: Keine APK-Dateien oder Indizes gefunden!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages

