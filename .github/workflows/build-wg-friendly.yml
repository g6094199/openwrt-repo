Der Fehler jq: parse error: Invalid numeric literal tritt auf, weil im GitHub-Workflow-Skript, das auf deinem Server oder in deinem Branch läuft, immer noch die falsche URL (https://github.com) eingetragen ist.
Der Log zeigt eindeutig, dass die Action diese Zeile ausgeführt hat:
LATEST_HASH=$(curl -s https://github.com | jq -r '.sha')
Da curl hier den normalen HTML-Quelltext der GitHub-Startseite lädt statt valider JSON-Daten, bricht jq mit einem Parse-Fehler ab.
Die Lösung: Ersetze die Datei komplett neu
Das Problem liegt oft daran, dass beim manuellen Editieren mit nano Zeilen übersehen wurden oder das Speichern nicht geklappt hat. Führe diese Befehle im Terminal deines Repositories aus, um die Datei .github/workflows/build-wg-friendly.yml sauber zu überschreiben:
bash

# 1. Wechsle in das Verzeichnis der Workflows
cd ~/OpenWRT-feed-collection/.github/workflows

# 2. Lösche die fehlerhafte Datei komplett
rm -f build-wg-friendly.yml

# 3. Erstelle die Datei neu mit dem korrekten API-Pfad
cat << 'EOF' > build-wg-friendly.yml
name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Fetch latest main commit hash and update Makefile
        run: |
          # HIER STEHT NUN DIE KORREKTE API-URL:
          LATEST_HASH=$(curl -s https://github.com | jq -r '.sha')
          echo "Aktuellster Commit-Hash auf main ist: $LATEST_HASH"
          
          if [ "$LATEST_HASH" = "null" ] || [ -z "$LATEST_HASH" ]; then
            echo "Fehler: Konnte Commit-Hash nicht von der GitHub API abrufen!"
            exit 1
          fi
          
          sed -i "s/PKG_SOURCE_VERSION:=PLACEHOLDER/PKG_SOURCE_VERSION:=$LATEST_HASH/" net/wg-friendly/Makefile

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-openwrt-25.12
          FEEDNAME: custom_feed
          PACKAGES: wg-friendly
          INDEX: 1
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          FEED_DIR: ${{ github.workspace }}
          ARTIFACTS_DIR: ${{ github.workspace }}

      - name: Prepare Feed for Deployment
        run: |
          mkdir -p deploy/packages/noarch
          
          echo "Suche nach gebauten APK-Dateien im Workspace..."
          find bin/packages/ -type f -name "*.apk" -exec cp -v {} deploy/packages/noarch/ \;
          find bin/packages/ -type f -name "APKINDEX.*" -exec cp -v {} deploy/packages/noarch/ \;
          
          if [ -z "$(ls -A deploy/packages/noarch)" ]; then
            echo "Fehler: Keine APK-Dateien generiert!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
EOF

