name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-openwrt-25.12
          FEEDNAME: g6094199_feed
          PACKAGES: wg-friendly
          INDEX: 1
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          FEED_DIR: ${{ github.workspace }}
          ARTIFACTS_DIR: ${{ github.workspace }}
          V: sc

      # NEU: Dieser Schritt erzwingt die Erstellung der APKINDEX.tar.gz
      - name: Generate legacy APKINDEX for broad compatibility
        run: |
          echo "Erzeuge APKINDEX.tar.gz im Workspace..."
          # Wir suchen den Ordner, in dem das SDK die Pakete abgelegt hat
          PKG_DIR=$(find bin/packages/ -type d -name "g6094199_feed" -print -quit || find . -type d -name "packages" -print -quit)
          
          if [ -n "$PKG_DIR" ] && [ -f "$PKG_DIR/packages.adb" ]; then
            cd "$PKG_DIR"
            # Spiegelt die packages.adb in das gezippte APKINDEX Format
            cp -v packages.adb APKINDEX
            tar -czf APKINDEX.tar.gz APKINDEX
            
            # Falls ein Signaturschlüssel existiert, signieren wir auch den tar.gz Index
            if [ -n "${{ secrets.APK_PRIVATE_KEY }}" ]; then
              echo "${{ secrets.APK_PRIVATE_KEY }}" > private_key.pem
              # Nutze OpenSSL um die Signatur für das tar.gz Archiv zu schreiben
              openssl dgst -sha256 -sign private_key.pem -out APKINDEX.tar.gz.sig APKINDEX.tar.gz || true
              rm -f private_key.pem
            fi
            rm -f APKINDEX
          else
            echo "Warnung: Konnte packages.adb für die Konvertierung nicht finden!"
          fi

      - name: Prepare Feed for Deployment
        run: |
          # Alle offiziellen OpenWrt 25.12 Paket-Plattformen
          ARCHS=(
            "x86_64" "x86_generic" "x86_geode"
            "aarch64_cortex-a53" "aarch64_cortex-a72" "aarch64_generic"
            "arm_cortex-a7_neon" "arm_cortex-a9" "arm_cortex-a9_neon" "arm_cortex-a9_vfpv3" "arm_cortex-a15_neon"
            "arm_arm1176jzf-s_vfp" "arm_arm926ej-s" "arm_fa526" "arm_mpcore" "arm_v7_vfp"
            "mipsel_24kc" "mipsel_74kc" "mipsel_mips32" "mips_24kc" "mips_74kc" "mips_mips32"
            "powerpc_464fp" "powerpc_85xx" "arc_arc700" "arc_archs" "riscv64_rv64imafdc_lp64d"
          )

          mkdir -p tmp_feed
          
          # Sammelt die .apk sowie ALLE Index-Dateien (packages.adb und APKINDEX.tar.gz) ein
          find . -type f -name "wg-friendly*.apk" -exec cp -v {} tmp_feed/ \;
          find . -type f -name "packages.adb*" -exec cp -v {} tmp_feed/ \;
          find . -type f -name "APKINDEX.tar.gz*" -exec cp -v {} tmp_feed/ \;

          if [ -z "$(ls -A tmp_feed)" ]; then
            echo "Fehler: Es wurden keine Paket-Dateien generiert!"
            exit 1
          fi

          # Spiegelt das gesamte Paket-Set in die standardkonformen OpenWrt-Pfade
          for ARCH in "${ARCHS[@]}"; do
            echo "Erstelle Struktur für: $ARCH"
            mkdir -p "deploy/packages/$ARCH/packages"
            cp tmp_feed/* "deploy/packages/$ARCH/packages/"
          done
          
          rm -rf tmp_feed

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true

