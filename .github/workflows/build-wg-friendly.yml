Was bewirkt das?
Standardmäßig versucht das Docker-Einstiegsskript (entrypoint.sh) im Container, in den vordefinierten Pfad /home/build/openwrt/ zu wechseln. Wenn man das GitHub-Repository als "Custom Feed" aufgebaut hat, knallt es genau dort, weil das SDK den gemounteten Pfad nicht richtig zuordnet. 
Indem du FEED_DIR: ${{ github.workspace }} übergibst, sagst du dem SDK explizit: „Nimm den Ordner, den du gerade aus GitHub ausgecheckt hast, als das Wurzelverzeichnis für den Feed“. ARTIFACTS_DIR steuert parallel dazu, wo die fertigen .apk-Dateien landen, damit der Runner sie nach dem Build auch wiederfindet. 
Der Haken bei der Sache
Wenn du diese Variablen setzt, musst du dem SDK auch mitteilen, welche Pakete gebaut werden sollen. Andernfalls versucht die Action, das gesamte Repository als ein einziges Paket zu interpretieren, anstatt die Unterordner (wie net/wg-friendly/) abzusuchen. 
