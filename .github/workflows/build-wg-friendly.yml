name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-openwrt-25.12
          FEEDNAME: g6094199
          PACKAGES: wg-friendly
          INDEX: 1
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          FEED_DIR: ${{ github.workspace }}
          ARTIFACTS_DIR: ${{ github.workspace }}
          V: sc

      - name: Prepare Feed for Deployment
        run: |
          # Alle offiziellen OpenWrt 25.12 Ziel-Architekturen
          ARCHS=(
            "x86_64" "x86_generic" "x86_geode"
            "aarch64_cortex-a53" "aarch64_cortex-a72" "aarch64_generic"
            "arm_cortex-a7_neon" "arm_cortex-a9" "arm_cortex-a9_neon" "arm_cortex-a9_vfpv3" "arm_cortex-a15_neon"
            "arm_arm1176jzf-s_vfp" "arm_arm926ej-s" "arm_fa526" "arm_mpcore" "arm_v7_vfp"
            "mipsel_24kc" "mipsel_74kc" "mipsel_mips32" "mips_24kc" "mips_74kc" "mips_mips32"
            "powerpc_464fp" "powerpc_85xx" "arc_arc700" "arc_archs" "riscv64_rv64imafdc_lp64d"
          )

          mkdir -p tmp_feed
          
          # Sucht die erzeugten .apk und Index-Dateien im SDK-Ausgabeordner
          find bin/ -type f -name "wg-friendly*.apk" -exec cp -v {} tmp_feed/ \;
          find bin/ -type f -name "packages.adb*" -exec cp -v {} tmp_feed/ \;

          if [ -z "$(ls -A tmp_feed)" ]; then
            echo "Fehler: Das Skriptpaket wg-friendly oder der Index wurde nicht im SDK-Pfad gefunden!"
            exit 1
          fi

          # Spiegelt die Architektur-unabhängigen Pakete in alle Zielarchitekturen
          for ARCH in "${ARCHS[@]}"; do
            echo "Erstelle Feed-Struktur für: $ARCH"
            mkdir -p "deploy/packages/$ARCH/g6094199"
            cp tmp_feed/* "deploy/packages/$ARCH/g6094199/"
          done

          # EXTRA-SCHRITT: Generiert den passenden Public-Key direkt aus dem GitHub-Secret
          echo "${{ secrets.APK_PRIVATE_KEY }}" > private_key.pem
          openssl pkey -in private_key.pem -pubout -out "deploy/packages/g6094199.pem"
          rm -f private_key.pem
          
          rm -rf tmp_feed

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true

