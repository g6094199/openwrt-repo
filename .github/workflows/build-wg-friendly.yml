Wenn du unbedingt immer den aktuellsten Stand des main-Branches bauen möchtest, ohne den Commit-Hash manuell im Makefile zu aktualisieren, ist das absolut machbar.
Das Problem ist, dass OpenWrt für seine Paket-Downloads zwingend eine reproduzierbare Quelle verlangt und die Angabe eines dynamischen Branch-Namens (main) innerhalb des Makefiles blockiert. 
Es gibt zwei saubere Wege, wie du das automatisierst:
Option A: Dynamischer GitHub Action "Patch" (Die eleganteste Lösung)
Du lässt im Makefile alles beim Alten, aber deine GitHub Action fragt vor dem eigentlichen Build den brandaktuellen Commit-Hash des Upstream-Repositories ab und schreibt ihn vollautomatisch in das Makefile, bevor das SDK startet.
Füge in deiner .github/workflows/build-feed.yml einfach einen kleinen curl-Zwischenschritt direkt nach dem Auschecken ein:
yaml

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      # DIESER SCHRITT ERMITTELT DEN AKTUELLEN MAIN-HASH UND PATCHT DAS MAKEFILE:
      - name: Fetch latest main commit hash and update Makefile
        run: |
          # 1. Neuesten Commit-Hash von der GitHub-API für das Upstream-Repo abfragen
          LATEST_HASH=$(curl -s https://github.com | jq -r '.sha')
          echo "Aktuellster Commit-Hash auf main ist: $LATEST_HASH"
          
          # 2. Den Platzhalter im Makefile durch den echten Hash ersetzen
          sed -i "s/PKG_SOURCE_VERSION:=.*/PKG_SOURCE_VERSION:=$LATEST_HASH/" net/wg-friendly/Makefile

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-openwrt-25.12
          FEEDNAME: custom_feed
          PACKAGES: wg-friendly
          INDEX: 1
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          FEED_DIR: ${{ github.workspace }}
          ARTIFACTS_DIR: ${{ github.workspace }}

