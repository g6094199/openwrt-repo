Nein, genau das ist das Problem. Die Angabe PKG_SOURCE_VERSION:=main (also ein Branch-Name) funktioniert im Zusammenspiel mit PKG_SOURCE_PROTO:=git im modernen OpenWrt-Buildsystem oft nicht mehr zuverlässig.
Das OpenWrt-Download-System benötigt kryptografische Eindeutigkeit für seine Downloads (Reproduzierbarkeit). Da sich ein Branch wie main jederzeit verändern kann, versucht das OpenWrt SDK beim Bauen, daraus einen festen Schnappschuss (Tarball) zu generieren. Bei diesem Prozess stürzt das interne Download-Skript ab und kürzt die URL fälschlicherweise auf https://github.com, was zu deinem 404 Not Found-Fehler führt.
Die goldene Regel für OpenWrt-Makefiles bei Git-Quellen:

    Falsch (bzw. riskant): PKG_SOURCE_VERSION:=main oder PKG_SOURCE_VERSION:=master
    Richtig: Ein vollständiger Commit-Hash (40-stellig) oder ein festes Release-Tag (z. B. v1.0.0).

