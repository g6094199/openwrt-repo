name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-openwrt-25.12
          FEEDNAME: custom_feed
          PACKAGES: wg-friendly
          # Auf 0 setzen, da die Action sonst versucht, alte opkg-Indizes zu erstellen:
          INDEX: 0
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          FEED_DIR: ${{ github.workspace }}
          ARTIFACTS_DIR: ${{ github.workspace }}

      - name: Prepare Feed for Deployment
        run: |
          mkdir -p deploy/packages/noarch

          echo "Suche nach gebauten APK-Dateien im gesamten Workspace..."
          # Geändert: Wir durchsuchen den gesamten aktuellen Workspace, da ARTIFACTS_DIR aktiv ist!
          find . -type f -name "*.apk" -exec cp -v {} deploy/packages/noarch/ \;
          find . -type f -name "APKINDEX.*" -exec cp -v {} deploy/packages/noarch/ \;

          # Sicherheitsprüfung
          if [ -z "$(ls -A deploy/packages/noarch)" ]; then
            echo "Fehler: Keine APK-Pakete im Workspace gefunden!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages

