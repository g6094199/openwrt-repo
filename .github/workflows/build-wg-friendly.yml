Dieser Fehler (/entrypoint.sh: line 8: cd: /home/build/openwrt/: No such file or directory) tritt auf, weil die offizielle GitHub Action openwrt/gh-action-sdk zwingend erwartet, dass das Repository eine vollständige, eigenständige OpenWrt-Feeds-Struktur besitzt.
Wenn die Action gestartet wird, sucht das Docker-SDK im Root-Verzeichnis deines Repositories nach den Feed-Ordnern. Da wir deine Struktur auf net/wg-friendly umgestellt haben, fehlt der Action der Kontext, dass dieses gesamte Repository als ein einziger Feed behandelt werden soll.
Um das zu beheben, müssen wir der Action mitteilen, dass dein aktuelles Repository direkt als Feed eingebunden werden soll.
Die Lösung: Workflow-Datei anpassen
Ersetze den Inhalt deiner .github/workflows/build-feed.yml durch die folgende korrigierte Version. Hier nutzen wir die Variable FEEDNAME und spiegeln das aktuelle Verzeichnis ($GITHUB_WORKSPACE) korrekt in den Container:
yaml

name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@v1
        env:
          ARCH: x86_64-25.12.4
          # WICHTIG: Definiert den Namen dieses Feeds im SDK
          FEEDNAME: custom_feed
          # Sagt der Action, dass das ausgecheckte Repo selbst der Quell-Feed ist
          PACKAGES: wg-friendly
          INDEX: 1
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}

      - name: Prepare Feed for Deployment
        run: |
          mkdir -p deploy/packages
          # Das offizielle SDK legt die gebauten Pakete in bin/packages/ abgelegte Strukturen ab
          if [ -d "bin/packages/x86_64/custom_feed" ]; then
            cp -r bin/packages/x86_64/custom_feed deploy/packages/noarch
          elif [ -d "bin/packages/x86_64/base" ]; then
            # Fallback falls das SDK es unter "base" oder direkt der Architektur ablegt
            cp -r bin/packages/x86_64 deploy/packages/noarch
          else
            # Universeller Kopierbefehl für die generierten APKs
            find bin/packages/ -name "*.apk" -exec cp {} deploy/packages/noarch/ \;
            find bin/packages/ -name "APKINDEX.*" -exec cp {} deploy/packages/noarch/ \;
          fi
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages

