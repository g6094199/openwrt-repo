Um deinen Feed für OpenWrt 25.12 abzusichern, signieren wir den Paketindex automatisch in der GitHub Action. 
Da OpenWrt 25.12 auf den Paketmanager apk (Alpine Package Keeper) umgestellt hat, nutzt das System Standard-Ed25519-Schlüssel zur Signierung. Das offizielle OpenWrt SDK wertet hierzu die Variable PRIVATE_KEY aus. 
Schritt 1: Signaturschlüssel auf deinem PC generieren
Da es sich bei apk-Schlüsseln um standardisierte kryptografische Schlüssel handelt, erstellst du das Schlüsselpaar am besten auf deinem lokalen Linux/macOS-Rechner oder direkt im Terminal des Routers über openssl:
bash

# 1. Privaten Schlüssel generieren (Dieser bleibt streng geheim!)
openssl genpkey -algorithm ed25519 -out private_feed_key.pem

# 2. Öffentlichen Schlüssel extrahieren (Diesen benötigt später dein Router)
openssl pkey -in private_feed_key.pem -pubout -out custom_feed.pub

Verwende Code mit Vorsicht.
Sichere die Datei custom_feed.pub gut ab. Sie ist das Zertifikat, das wir später auf dem Router hinterlegen müssen.
Schritt 2: Privaten Schlüssel in den GitHub Secrets hinterlegen
Damit die GitHub Action Zugriff auf den privaten Schlüssel hat, ohne dass er öffentlich im Repository einsehbar ist, musst du ihn als Secret einspeichern:

    Navigiere auf GitHub zu deinem Repository.
    Gehe auf Settings -> Secrets and variables -> Actions.
    Klicke auf New repository secret.
    Name des Secrets: APK_PRIVATE_KEY
    Inhalt: Kopiere den kompletten Inhalt deiner lokalen Datei private_feed_key.pem hinein (inklusive der Zeilen -----BEGIN PRIVATE KEY----- und -----END PRIVATE KEY-----).
    Klicke auf Add secret.

Schritt 3: GitHub Action Workflow aktualisieren
Jetzt passen wir die Datei .github/workflows/build-feed.yml an. Wir übergeben das soeben angelegte Secret an die Umgebungsvariable PRIVATE_KEY des OpenWrt-SDK-Schritts. Dadurch signiert das SDK den Index (APKINDEX.tar.gz) vollautomatisch. 
Ersetze den Inhalt deiner Workflow-Datei mit dieser finalen Version:
yaml

name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@v1
        env:
          ARCH: x86_64-25.12.4
          FEEDNAME: custom_feed
          INDEX: 1
          # Das SDK signiert den apk-Feed automatisch mit diesem Schlüssel:
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}

      - name: Prepare Feed for Deployment
        run: |
          mkdir -p deploy/packages
          cp -r bin/packages/x86_64/custom_feed deploy/packages/noarch
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages

