jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    container:
      image: openwrt/sdk:x86-64 # Nutzt das offizielle, fertige SDK für 25.12
    env:
      REPO_PACKAGES_DIR: repo/packages
      GHPAGES_BRANCH: gh-pages
      WG_FRIENDLY_COMMIT: main

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare package inside SDK
        run: |
          # Im SDK-Container sind die Pfade bereits vorbereitet
          mkdir -p package/local/wg-friendly/files
          
          # Korrekte GitHub-Actions-Syntax für Env-Variablen
          RAW_URL="githubusercontent.com{{ env.WG_FRIENDLY_COMMIT }}/wg-friendly"
          curl -fsSL "$RAW_URL" -o package/local/wg-friendly/files/wg-friendly
          chmod 0755 package/local/wg-friendly/files/wg-friendly

          # Makefile mit echten Tabs (\t) befüllen
          cat << 'EOF' > package/local/wg-friendly/Makefile
include $(TOPDIR)/rules.mk

PKG_NAME:=wg-friendly
PKG_VERSION:=0.1.0
PKG_RELEASE:=1
PKG_MAINTAINER:=g6094199
PKG_LICENSE:=GPL-3.0

include $(INCLUDE_DIR)/package.mk

define Package/wg-friendly
  SECTION:=net
  CATEGORY:=Network
  TITLE:=WireGuard friendly CLI peer names
  DEPENDS:=+wireguard-tools
endef

define Build/Compile
enddefine

define Package/wg-friendly/install
	$(INSTALL_DIR) $(1)/usr/bin
	$(INSTALL_BIN) ./files/wg-friendly $(1)/usr/bin/wg-friendly
endef

$(eval $(call BuildPackage,wg-friendly))
EOF

      - name: Build package
        run: |
          # Da es das fertige SDK ist, reicht dieser Befehl sofort aus!
          make package/local/wg-friendly/compile V=s

      - name: Collect artifacts
        run: |
          mkdir -p ../${{ env.REPO_PACKAGES_DIR }}
          find bin/packages -type f -name "*.apk" -exec cp {} ../${{ env.REPO_PACKAGES_DIR }}/ \;
          
          # APK-Index erstellen (apk-tools sind im SDK bereits vorinstalliert)
          cd ../${{ env.REPO_PACKAGES_DIR }}
          apk index -o packages.adb *.apk

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ../${{ env.REPO_PACKAGES_DIR }}
          publish_branch: ${{ env.GHPAGES_BRANCH }}
