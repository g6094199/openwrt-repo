Der Fehler tritt auf, weil du in deiner GitHub-Workflow-Datei wahrscheinlich zwei ähnlich benannte Dateien im Ordner .github/workflows/ hast (z. B. build-feed.yml und build-wg-friendly.yml). GitHub Actions führt im Hintergrund immer noch die alte, fehlerhafte Version mit der URL https://github.com aus.
Zusätzlich hat dein aktuelles Makefile in Zeile 10 immer noch den Fehler PKG_SOURCE_URL:=https://github.com. Das OpenWrt SDK wird dort beim Klonen abstürzen, selbst wenn der GitHub-API-Schritt funktioniert.
Befolge diese Schritte im Terminal deiner Build-Umgebung, um das Repository vollständig aufzuräumen und beide Dateien fehlerfrei zu überschreiben:
Schritt 1: GitHub-Workflows aufräumen und neu erstellen
Führe diese Befehle aus, um alle alten Workflow-Dateien zu löschen und eine einzige, korrekte Datei anzulegen:
bash

# 1. In das Workflow-Verzeichnis wechseln
cd ~/OpenWRT-feed-collection/.github/workflows

# 2. Alle alten YAML-Dateien restlos löschen
rm -f *.yml *.yaml

# 3. Die korrekte Build-Datei erstellen
cat << 'EOF' > build-feed.yml
name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Fetch latest main commit hash and update Makefile
        run: |
          # Fragt gezielt das Quellcode-Repository der Peer-Names ab
          API_URL="https://github.com"
          LATEST_HASH=$(curl -s "$API_URL" | jq -r '.sha')
          echo "Aktuellster Commit-Hash auf main ist: $LATEST_HASH"

          if [ "$LATEST_HASH" = "null" ] || [ -z "$LATEST_HASH" ]; then
            echo "Fehler: Konnte Commit-Hash nicht von der GitHub API abrufen!"
            exit 1
          fi

          sed -i "s/PKG_SOURCE_VERSION:=PLACEHOLDER/PKG_SOURCE_VERSION:=$LATEST_HASH/" net/wg-friendly/Makefile

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-openwrt-25.12
          FEEDNAME: custom_feed
          PACKAGES: wg-friendly
          INDEX: 1
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          FEED_DIR: ${{ github.workspace }}
          ARTIFACTS_DIR: ${{ github.workspace }}

      - name: Prepare Feed for Deployment
        run: |
          mkdir -p deploy/packages/noarch

          echo "Suche nach gebauten Paket-Dateien im Workspace..."
          find bin/packages/ -type f -name "*.apk" -exec cp -v {} deploy/packages/noarch/ \;
          find bin/packages/ -type f -name "APKINDEX.*" -exec cp -v {} deploy/packages/noarch/ \;

          if [ -z "$(ls -A deploy/packages/noarch)" ]; then
            echo "Fehler: Keine Paket-Dateien generiert!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
EOF

Verwende Code mit Vorsicht.
Schritt 2: Das OpenWrt-Makefile korrigieren
Wechsle in den Paketordner und korrigiere die Quellcode-URL in Zeile 10, damit das SDK weiß, woher es den Code laden muss:
bash

cd ~/OpenWRT-feed-collection/net/wg-friendly/
rm -f Makefile

cat << 'EOF' > Makefile
include $(TOPDIR)/rules.mk

PKG_NAME:=wg-friendly
PKG_VERSION:=0.1.0
PKG_RELEASE:=2

# Hier muss die vollständige URL zum Skript-Repository stehen:
PKG_SOURCE_PROTO:=git
PKG_SOURCE_URL:=https://github.com
PKG_SOURCE_VERSION:=PLACEHOLDER
PKG_MIRROR_HASH:=skip

PKG_MAINTAINER:=g6094199
PKG_LICENSE:=GPL-3.0
PKG_LICENSE_FILES:=LICENSE

include $(INCLUDE_DIR)/package.mk

define Package/wg-friendly
  SECTION:=net
  CATEGORY:=Network
  TITLE:=WireGuard friendly CLI peer names
  DEPENDS:=+wireguard-tools
  PKGARCH:=all
endef

define Package/wg-friendly/description
  Small helper to show WireGuard peers with friendly names from UCI.
endef

define Build/Prepare
	$(call Build/Prepare/Default)
endef

define Build/Compile
	# Reines Shell-Skript, keine Kompilierung nötig
endef

define Package/wg-friendly/install
	$(INSTALL_DIR) $(1)/usr/bin
	$(INSTALL_BIN) $(PKG_BUILD_DIR)/wg-friendly $(1)/usr/bin/wg-friendly

	$(INSTALL_DIR) $(1)/usr/share/doc/wg-friendly
	$(INSTALL_DATA) $(PKG_BUILD_DIR)/README.md $(1)/usr/share/doc/wg-friendly/README.md
endef

$(eval $(call BuildPackage,wg-friendly))
EOF

