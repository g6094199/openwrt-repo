Ja, ganz genau! Du hast den Kern der OpenWrt-Paketverwaltung vollkommen richtig erfasst.
Wenn der Quellcode für dein Tool in einem anderen, separaten Repository liegt (zum Beispiel unter wg-friendly), dann musst du im Makefile die Zeile PKG_SOURCE_URL exakt auf die Git-URL dieses spezifischen Repositories ändern.
So passt du das Makefile an
Wenn das Upstream-Repository beispielsweise https://github.com/g6094199/wg-friendly.git heißt, sieht der obere Teil deiner net/wg-friendly/Makefile so aus:
makefile

include $(TOPDIR)/rules.mk

PKG_NAME:=wg-friendly
PKG_VERSION:=0.1.0
PKG_RELEASE:=3

# Das OpenWrt SDK klont nun das von dir definierte, separate Quell-Repository:
PKG_SOURCE_PROTO:=git
PKG_SOURCE_URL:=https://github.com/g6094199/wg-friendly.git
PKG_SOURCE_VERSION:=PLACEHOLDER
PKG_MIRROR_HASH:=skip

PKG_MAINTAINER:=g6094199
# ... der Rest des Makefiles bleibt identisch ...

