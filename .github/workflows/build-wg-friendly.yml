Was diese Korrekturen bewirken:

    API-Pfad repariert: Der curl-Befehl in der Action steuert jetzt das JSON-Datenobjekt an, aus dem jq den SHA-256-Hash extrahieren kann.
    Download-Pfad repariert: Das OpenWrt SDK lädt jetzt das korrekte Repository herunter, anstatt am leeren github.com ohne Pfadangabe zu scheitern.
    PKGARCH:=all: Da es ein Shell-Skript ist, wird das Paket als universelles noarch-Paket gebaut.

