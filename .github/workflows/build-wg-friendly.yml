name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-openwrt-25.12
          FEEDNAME: g6094199_feed
          PACKAGES: wg-friendly
          INDEX: 1
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          FEED_DIR: ${{ github.workspace }}
          ARTIFACTS_DIR: ${{ github.workspace }}
          V: sc

      - name: Prepare Feed for Deployment (index & sign using Alpine container)
        env:
          APK_PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          ARCHS=(
            "x86_64" "x86_generic" "x86_geode"
            "aarch64_cortex-a53" "aarch64_cortex-a72" "aarch64_generic"
            "arm_cortex-a7_neon" "arm_cortex-a9" "arm_cortex-a9_neon" "arm_cortex-a9_vfpv3" "arm_cortex-a15_neon"
            "arm_arm1176jzf-s_vfp" "arm_arm926ej-s" "arm_fa526" "arm_mpcore" "arm_v7_vfp"
            "mipsel_24kc" "mipsel_74kc" "mipsel_mips32" "mips_24kc" "mips_74kc" "mips_mips32"
            "powerpc_464fp" "powerpc_85xx" "arc_arc700" "arc_archs" "riscv64_rv64imafdc_lp64d"
          )

          mkdir -p tmp_feed

          # Kopiere .apk und vorhandene Index-/packages.adb-Dateien
          find . -type f -name "wg-friendly*.apk" -exec cp -v {} tmp_feed/ \;
          find . -type f -name "packages.adb*" -exec cp -v {} tmp_feed/ \;
          find . -type f -name "APKINDEX.*" -exec cp -v {} tmp_feed/ \;

          if [ -z "$(ls -A tmp_feed)" ]; then
            echo "Fehler: Dein Paket wg-friendly wurde nicht generiert!"
            exit 1
          fi

          # Schreibe privaten Schlüssel temporär (nur für Container-Bindmount)
          printf '%s\n' "$APK_PRIVATE_KEY" > tmp_feed/apk_priv.key
          chmod 600 tmp_feed/apk_priv.key

          # Verwende kurzen Alpine-Container zum Installieren von apk-tools, Indexieren und Signieren
          docker run --rm -v "$PWD/tmp_feed":/feed alpine:3.19 sh -eux -c '
            apk add --no-cache apk-tools
            cd /feed
            apk index -o APKINDEX.tar.gz ./*.apk
            apk sign --key apk_priv.key APKINDEX.tar.gz
          '

          # Entferne den privaten Schlüssel sofort lokal
          if command -v shred >/dev/null 2>&1; then
            shred -u tmp_feed/apk_priv.key 2>/dev/null || rm -f tmp_feed/apk_priv.key
          else
            rm -f tmp_feed/apk_priv.key
          fi

          # Spiegle Paket + Index in die OpenWrt-Pfade für alle ARCHs
          for ARCH in "${ARCHS[@]}"; do
            echo "Erstelle Struktur für: $ARCH"
            mkdir -p "deploy/packages/$ARCH/packages"
            cp -v tmp_feed/* "deploy/packages/$ARCH/packages/"
          done

          rm -rf tmp_feed

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          force_orphan: true

