Um das Repository so zu modernisieren, dass es vollautomatisch über GitHub Builds Pakete für OpenWrt 25.12 bereitstellt und einen nutzbaren Feed erzeugt, sind grundlegende Anpassungen nötig. Der größte technologische Sprung in OpenWrt 25.12 ist die Umstellung von opkg (.ipk) auf apk (.apk).
Hier ist ein strukturierter Fahrplan, wie du das Repository umbaust und die CI/CD-Pipeline einrichtest:
1. Struktur des Repositories anpassen
OpenWrt benötigt eine klare Verzeichnisstruktur, damit die Buildroot den Feed einlesen kann.

    Ordner-Struktur: Erstelle für jedes Paket eine saubere Unterteilung nach Kategorien (z. B. net, utils, luci).
    text

    ├── .github/workflows/   <-- Hier landen die CI-Skripte
    ├── net/
    │   └── mein-paket/
    │       └── Makefile     <-- Das eigentliche OpenWrt-Buildscript
    ├── luci/
    │   └── luci-app-mein/
    │       └── Makefile
    └── README.md

    Verwende Code mit Vorsicht.

2. Makefiles für OpenWrt 25.12 (apk) patchen
Die alten Makefiles im Quell-Repository nutzen oft veraltete Variablen. Für OpenWrt 25.12 musst du folgende Dinge in den Makefile-Dateien prüfen:

    PKG_RELEASE hochstufen: Nach großen Versionssprüngen die Release-Nummer anpassen.
    Keine proprietären opkg-Skripte: Falls deine Pakete postinst- oder prerm-Skripte nutzen, stelle sicher, dass diese POSIX-konform sind, da apk strikter agiert als das alte opkg.
    Abhängigkeiten prüfen: Die Namen einiger Basispakete haben sich mit 25.12 leicht geändert. Überprüfe die Zeile DEPENDS:=+liblua ... auf Aktualität.

3. GitHub Actions für automatische Builds einrichten
Der eleganteste Weg ist die Nutzung von GitHub Actions in Kombination mit dem offiziellen OpenWrt Software Development Kit (SDK) via Docker.
Erstelle eine Datei unter .github/workflows/build-feed.yml mit folgendem Inhalt. Dieses Skript nutzt das populäre gh-action-sdk von openwrt:
yaml

name: Build OpenWrt 25.12 Feed

on:
  push:
    branches:
      - main
  workflow_dispatch: # Erlaubt manuelles Starten

jobs:
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Hier die gewünschten Ziel-Architekturen eintragen (z.B. x86_64, aarch64_cortex-a53, mipsel_24kc)
        arch: [x86_64, aarch64_cortex-a53]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@v1
        env:
          ARCH: ${{ matrix.arch }}-25.12.4  # Baut exakt für die aktuelle 25.12.4 Version
          FEEDNAME: custom_feed
          INDEX: 1                          # Erstellt automatisch den Paket-Index (wichtig für apk!)
          # Optional: Falls Pakete signiert werden sollen, hier den Private Key hinterlegen
          # PRIVATE_KEY: ${{ secrets.APK_SIGNING_KEY }} 

      - name: Save APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.arch }}
          path: bin/packages/${{ matrix.arch }}/custom_feed/*.apk

Verwende Code mit Vorsicht.
