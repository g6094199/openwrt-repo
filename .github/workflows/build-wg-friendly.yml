Das bereitgestellte Makefile hat ein paar strukturelle Probleme, die unter OpenWrt 25.12 zu Fehlern beim Bauen führen werden.
Was im alten Makefile problematisch ist:

    Missbrauch von Build/Prepare: Das Klonen von Git-Repositories darf niemals manuell per git clone innerhalb von Build/Prepare geschehen. OpenWrt bringt dafür ein eigenes, extrem robustes Download-System mit. Wenn du es manuell machst, schlagen Offline-Builds fehl, Caching funktioniert nicht, und GitHub sperrt dich bei parallelen Builds wegen Rate-Limits.
    Pfad-Fehler (./files): Der relative Pfad ./files bezieht sich in OpenWrt auf das Verzeichnis innerhalb deines Feeds. Wenn du dort während des Builds Dateien reinschreibst, verschmutzt du die Buildroot. Dateien müssen aus $(PKG_BUILD_DIR) gelesen und nach $(1) (dem Ziel-Dateisystem) kopiert werden.
    Fehlende Lizenzdatei-Referenz: README existiert im Upstream-Repo als README.md.

Das optimierte Makefile für OpenWrt 25.12
Hier ist das sauber korrigierte und an OpenWrt 25.12 angepasste Makefile. Es nutzt die nativen OpenWrt-Git-Makros. Ersetze den Inhalt deiner package/wg-friendly/Makefile durch folgenden Code:
makefile

# package/wg-friendly/Makefile
include $(TOPDIR)/rules.mk

PKG_NAME:=wg-friendly
PKG_VERSION:=0.1.0
PKG_RELEASE:=2

# Nutze das native OpenWrt-Downloadsystem für Git
PKG_SOURCE_PROTO:=git
PKG_SOURCE_URL:=https://github.com/g6094199/OpenWRT-Wireguard-friendly-cli-peernames.git
# Nutze den aktuellen Commit-Hash oder ein Tag (z.B. main für den letzten Stand)
PKG_SOURCE_VERSION:=main
PKG_MIRROR_HASH:=skip

PKG_MAINTAINER:=g6094199
PKG_LICENSE:=GPL-3.0-or-later
PKG_LICENSE_FILES:=LICENSE

include $(INCLUDE_DIR)/package.mk

define Package/wg-friendly
  SECTION:=net
  CATEGORY:=Network
  TITLE:=WireGuard friendly CLI peer names
  DEPENDS:=+wireguard-tools
  PKGARCH:=all
endef

define Package/wg-friendly/description
  Small helper script to show WireGuard peers with friendly names from UCI.
endef

# Build/Prepare wird nicht mehr überschrieben! OpenWrt lädt und entpackt nun alles vollautomatisch nach $(PKG_BUILD_DIR)

define Build/Compile
	# Nichts zu tun, da es sich um ein reines Shell-Skript handelt
endef

define Package/wg-friendly/install
	# Erstelle das Zielverzeichnis auf dem Router
	$(INSTALL_DIR) $(1)/usr/bin
	# Kopiere das Skript direkt aus dem entpackten Quellcode-Ordner
	$(INSTALL_BIN) $(PKG_BUILD_DIR)/wg-friendly $(1)/usr/bin/wg-friendly

	# Optional: Dokumentation mitkopieren (Achte auf .md Endung)
	$(INSTALL_DIR) $(1)/usr/share/doc/wg-friendly
	$(INSTALL_DATA) $(PKG_BUILD_DIR)/README.md $(1)/usr/share/doc/wg-friendly/README.md
endef

$(eval $(call BuildPackage,wg-friendly))

Verwende Code mit Vorsicht.
Wichtige Verbesserungen im Detail:

    PKGARCH:=all hinzugefügt: Da es sich um ein reines Shell-Skript handelt, ist es plattformunabhängig. Ohne dieses Flag würde die GitHub-Action das Paket für jede Architektur (x86_64, aarch64, mipsel) separat kompilieren müssen. Mit all wird es einmal gebaut und ist überall installierbar (spart massiv CI-Rechenzeit!).
    Automatischer Download: Durch das Entfernen des Build/Prepare-Hacks lädt das OpenWrt SDK das Repo nun standardmäßig als Tarball/Git-Mirror herunter und legt es sauber in $(PKG_BUILD_DIR) ab.
    Pfad-Korrektur: Das Skript wird nun im install-Schritt direkt via $(PKG_BUILD_DIR)/wg-friendly gegriffen.

