In deinem aktuellen Setup haben sich in beiden Dateien schwerwiegende Fehler eingeschlichen, die den Build komplett blockieren werden. Du hast an mehreren Stellen die echte URL durch das reine https://github.com ersetzt – sowohl bei der API-Abfrage in der GitHub Action als auch bei der Download-URL im Makefile.
Dadurch versucht curl, den Commit-Hash von der Hauptseite von GitHub abzufragen (was in jq: error (at <interactive>): Cannot index string with string "sha" resultiert), und das OpenWrt SDK versucht, ein leeres GitHub-Root-Verzeichnis zu klonen.
Hier ist die exakte und vollständig korrigierte Version für beide Dateien, damit Variante A reibungslos funktioniert.
1. Die korrigierte GitHub Action (build-wg-friendly.yml)
Ersetze den Inhalt deiner .github/workflows/build-wg-friendly.yml mit diesem Code. Achte darauf, wie der curl-Befehl nun die echte GitHub API des Upstream-Repositories ansteuert:
yaml

name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      # DIESER SCHRITT ERMITTELT DEN AKTUELLEN MAIN-HASH UND PATCHT DAS MAKEFILE:
      - name: Fetch latest main commit hash and update Makefile
        run: |
          # 1. Fragt die offizielle API nach dem aktuellsten Commit des echten Repositories ab
          LATEST_HASH=$(curl -s https://github.com | jq -r '.sha')
          echo "Aktuellster Commit-Hash auf main ist: $LATEST_HASH"
          
          if [ "$LATEST_HASH" = "null" ] || [ -z "$LATEST_HASH" ]; then
            echo "Fehler: Konnte Commit-Hash nicht von der GitHub API abrufen!"
            exit 1
          fi
          
          # 2. Ersetzt den Platzhalter dynamisch im Makefile vor dem Build
          sed -i "s/PKG_SOURCE_VERSION:=.*/PKG_SOURCE_VERSION:=$LATEST_HASH/" net/wg-friendly/Makefile

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-openwrt-25.12
          FEEDNAME: custom_feed
          PACKAGES: wg-friendly
          INDEX: 1
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}
          FEED_DIR: ${{ github.workspace }}
          ARTIFACTS_DIR: ${{ github.workspace }}

      - name: Prepare Feed for Deployment
        run: |
          mkdir -p deploy/packages/noarch
          
          echo "Suche nach gebauten APK-Dateien im Workspace..."
          find bin/packages/ -type f -name "*.apk" -exec cp -v {} deploy/packages/noarch/ \;
          find bin/packages/ -type f -name "APKINDEX.*" -exec cp -v {} deploy/packages/noarch/ \;
          
          if [ -z "$(ls -A deploy/packages/noarch)" ]; then
            echo "Fehler: Keine APK-Dateien generiert!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages

Verwende Code mit Vorsicht.
2. Das korrigierte OpenWrt Makefile (net/wg-friendly/Makefile)
Ersetze den Inhalt deiner net/wg-friendly/Makefile mit diesem Code. Hier wurde die korrekte Git-URL wieder hinterlegt und das Paketarchitektur-Flag PKGARCH:=all ergänzt (da es ein plattformunabhängiges Shell-Skript ist):
makefile

# package/wg-friendly/Makefile
include $(TOPDIR)/rules.mk

PKG_NAME:=wg-friendly
PKG_VERSION:=0.1.0
PKG_RELEASE:=2

# Die vollständige Quell-URL zum Repository des Skripts
PKG_SOURCE_PROTO:=git
PKG_SOURCE_URL:=https://github.com
# Wird von der GitHub Action dynamisch vor jedem Build überschrieben
PKG_SOURCE_VERSION:=PLACEHOLDER
PKG_MIRROR_HASH:=skip

PKG_MAINTAINER:=g6094199
PKG_LICENSE:=GPL-3.0
PKG_LICENSE_FILES:=LICENSE

include $(INCLUDE_DIR)/package.mk

define Package/wg-friendly
  SECTION:=net
  CATEGORY:=Network
  TITLE:=WireGuard friendly CLI peer names
  DEPENDS:=+wireguard-tools
  PKGARCH:=all
endef

define Package/wg-friendly/description
  Small helper to show WireGuard peers with friendly names from UCI.
endef

define Build/Prepare
	$(call Build/Prepare/Default)
endef

define Build/Compile
	# Reines Shell-Skript, keine Kompilierung nötig
endef

define Package/wg-friendly/install
	$(INSTALL_DIR) $(1)/usr/bin
	$(INSTALL_BIN) $(PKG_BUILD_DIR)/wg-friendly $(1)/usr/bin/wg-friendly

	$(INSTALL_DIR) $(1)/usr/share/doc/wg-friendly
	$(INSTALL_DATA) $(PKG_BUILD_DIR)/README.md $(1)/usr/share/doc/wg-friendly/README.md
endef

$(eval $(call BuildPackage,wg-friendly))

