name: Build and Deploy APK Feed

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed
        uses: actions/checkout@v4

      - name: Debug Repo Structure
        run: |
          echo "Repo root content:"
          ls -R .
        
      - name: Prepare Feed Directory
        run: |
          mkdir -p openwrt_feed_collection/custom
          cp -R custom/net openwrt_feed_collection/custom/

      - name: Build with SDK (allarch)
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: all
          FEED_DIR: openwrt_feed_collection
          PACKAGES: wg-friendly
          INDEX: 1

      - name: Collect APKs
        run: |
          mkdir -p deploy/all
          find bin/packages/ -name "wg-friendly*.apk" -exec cp {} deploy/all/ \;
          find bin/packages/ -name "Packages*" -exec cp {} deploy/all/ \;
          echo "<h1>OpenWrt Feed Collection</h1><p>Update: $(date)</p>" > deploy/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
