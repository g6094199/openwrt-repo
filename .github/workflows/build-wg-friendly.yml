Verwende Code mit Vorsicht.
Sobald der Push abgeschlossen ist, wird GitHub Actions ausschließlich den neuen Workflow build-feed.yml triggern, der korrekte JSON-Daten liest und das Paket über die echte Repository-URL fehlerfrei kompiliert.
Läuft der Build-Lauf nach dieser Bereinigung erfolgreich durch?
KI-Antworten können Fehler enthalten. Weitere Informationen
ex existiert nur: .github/workflows/build-wg-friendly.yml
10:57
Das Rätsel lässt sich ganz einfach aufklären: Wenn in deinem lokalen Repository im Verzeichnis .github/workflows/ tatsächlich nur die Datei build-wg-friendly.yml mit dem korrekten Inhalt existiert, dann sind deine Änderungen schlichtweg noch nicht auf den Servern von GitHub angekommen oder wurden in einen anderen Branch geschoben.
Der Fehlerlog zeigt unmissverständlich, dass GitHub im Hintergrund Code ausführt, der die Zeile LATEST_HASH=$(curl -s https://github.com | jq -r '.sha') enthält. Das bedeutet, dass auf GitHub im main-Branch definitiv noch eine veraltete Version dieser Datei liegt.
Führe die folgenden Befehle im Terminal deines Repositories (~/OpenWRT-feed-collection) aus, um sicherzustellen, dass dein lokaler, korrekter Stand die fehlerhafte Version auf GitHub überschreibt:
1. Status und aktuellen Branch prüfen
bash

cd ~/OpenWRT-feed-collection
git status
git branch

Verwende Code mit Vorsicht.
Stelle sicher, dass du dich auf dem Branch main befindest.
2. Änderungen erzwingen und hochladen
Oftmals speichert man Änderungen, vergisst aber, sie dem Git-Commit hinzuzufügen. Mit diesen Schritten laden wir die korrekte Datei jetzt garantiert auf GitHub hoch:
bash

# Fügt alle Änderungen (auch das geänderte Makefile und die YAML) definitiv hinzu
git add .github/workflows/build-wg-friendly.yml
git add net/wg-friendly/Makefile

# Erstellt einen neuen Commit
git commit -m "force update: use correct api url and fix makefile"

# Schiebt die Änderungen hoch zu GitHub
git push origin main

Verwende Code mit Vorsicht.
3. Kontrolle auf der GitHub-Webseite
Nachdem der git push-Befehl erfolgreich durchgelaufen ist:

    Gehe im Browser auf deine GitHub-Repository-Seite.
    Klicke auf den Reiter Actions.
    Wähle den neuesten Workflow-Durchlauf aus, der gerade gestartet wurde.
    Klicke auf den Job Build Feed und öffne den Schritt Fetch latest main commit hash and update Makefile.

Du wirst sehen, dass dort nun der korrekte curl-Befehl zur ://github.com steht, wodurch der jq-Fehler sofort verschwindet und das OpenWrt SDK mit dem Bauen beginnt.
Lass uns wissen, ob der Push geklappt hat und ob die Pipeline jetzt endlich den grünen Haken anzeigt!
