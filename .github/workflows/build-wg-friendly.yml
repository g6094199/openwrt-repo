name: Build and Deploy APK Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Feed
        uses: actions/checkout@v4

      # Dieser Schritt behebt den "No such file or directory" Fehler
      - name: Create Feed Directory
        run: |
          mkdir -p openwrt_feed_collection
          # Kopiere den Inhalt des Repos in den Unterordner für das SDK
          cp -R net openwrt_feed_collection/ 2>/dev/null || true
          cp -R utils openwrt_feed_collection/ 2>/dev/null || true

      - name: Build with SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64
          # Hier nutzen wir jetzt den vorbereiteten Ordner
          FEED_DIR: openwrt_feed_collection
          PACKAGES: wg-friendly

      - name: Prepare Feed Directory
        run: |
          mkdir -p deploy/all
          # Suche nach den gebauten APKs im bin-Ordner des SDK-Workspace
          find bin/packages/ -name "*.apk" -exec cp {} deploy/all/ \;
          find bin/packages/ -name "packages.adb" -exec cp {} deploy/all/ \;
          echo "<h1>OpenWrt Feed Collection</h1><p>Update: $(date)</p>" > deploy/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true
