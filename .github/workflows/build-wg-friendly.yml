Nein, das liegt nicht an der Architekturbezeichnung. Die Syntax ARCH: x86_64-25.12.4 (bzw. wie in echten OpenWrt-Community-Projekten genutzt: ARCH: x86_64-openwrt-25.12) ist strukturell richtig, da das SDK immer die Ziel-Architektur gekoppelt mit dem Release-Zweig als Docker-Tag verlangt. 
Der wiederholte Fehler /entrypoint.sh: line 8: cd: /home/build/openwrt/: No such file or directory hat eine andere, sehr spezifische Ursache in der Art und Weise, wie GitHub Actions die Ordnerstruktur an das Docker-SDK übergibt.
Warum der Fehler auftritt
Die SDK-Docker-Container erwarten im Hauptverzeichnis des Repositories zwingend die Konfigurationsdateien eines Feeds (wie eine feeds.conf oder ein direktes Makefile). Da dein Repository im Hauptverzeichnis (Root) im Moment nur den Unterordner net/ enthält, erkennt das Einstiegsskript des Docker-Containers den Ordner nicht als gültigen Workspace an, bricht das Mapping ab und wirft diesen irreführenden cd-Fehler.
Die finale Lösung (Erprobter Community-Standard)
Um der Action exakt das zu geben, was sie erwartet, müssen wir die GitHub Action anweisen, dein Repository als externen Feed zu behandeln, anstatt zu versuchen, das Hauptverzeichnis direkt als OpenWrt-Core-Ordner zu kompilieren. Das erreichen wir, indem wir die Variablen FEEDNAME und PACKAGES sauber trennen und das offizielle SDK wie folgt konfigurieren. 
Ersetze den Inhalt deiner .github/workflows/build-feed.yml durch dieses exakte Setup:
yaml

name: Build and Sign OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Build and Sign Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          # Bestimmt die Plattform und die OpenWrt-Version
          ARCH: x86_64-openwrt-25.12
          # Teilt dem SDK mit, dass unser Repo ein Paket-Feed ist
          FEEDNAME: custom_feed
          # Das konkrete Paket, das erzwungen gebaut werden soll
          PACKAGES: wg-friendly
          INDEX: 1
          PRIVATE_KEY: ${{ secrets.APK_PRIVATE_KEY }}

      - name: Prepare Feed for Deployment
        run: |
          mkdir -p deploy/packages/noarch
          
          echo "Suche nach gebauten APK-Dateien im Workspace..."
          # Das SDK legt die Dateien nach dem erfolgreichen Build im GITHUB_WORKSPACE ab
          find bin/packages/ -type f -name "*.apk" -exec cp -v {} deploy/packages/noarch/ \;
          find bin/packages/ -type f -name "APKINDEX.*" -exec cp -v {} deploy/packages/noarch/ \;
          
          if [ -z "$(ls -A deploy/packages/noarch)" ]; then
            echo "Fehler: Keine APK-Dateien generiert!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages

