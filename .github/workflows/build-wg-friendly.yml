Damit deine GitHub-Pipeline nun vollautomatisch das Paket für OpenWrt 25.12 baut, einen funktionierenden apk-Feed generiert und diesen über GitHub Pages bereitstellt, müssen wir jetzt die CI/CD-Pipeline einrichten.
Hier ist die Schritt-für-Schritt-Anleitung, wie du die GitHub Action konfigurierst:
1. GitHub Action Datei anlegen
Erstelle in deinem Repository eine neue Datei unter dem Pfad:
.github/workflows/build-feed.yml
Füge dort folgenden Inhalt ein. Dieser Workflow nutzt das offizielle OpenWrt SDK, baut das Paket als plattformunabhängiges Architektur-Paket (noarch) und schiebt das Ergebnis auf den gh-pages Branch:
yaml

name: Build OpenWrt 25.12 apk Feed

on:
  push:
    branches:
      - main
  workflow_dispatch: # Erlaubt manuelles Starten über die GitHub-Oberfläche

permissions:
  contents: write

jobs:
  build:
    name: Build Feed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Feed-Repository
        uses: actions/checkout@v4

      - name: Build Packages via OpenWrt SDK
        uses: openwrt/gh-action-sdk@v1
        env:
          # Wir nutzen das SDK für x86_64, da wg-friendly plattformunabhängig (Shell-Script) ist
          ARCH: x86_64-25.12.4
          FEEDNAME: custom_feed
          INDEX: 1

      - name: Prepare Feed for Deployment
        run: |
          mkdir -p deploy/packages
          # Kopiere die gebauten Pakete und die Index-Dateien (.apk und APKINDEX.tar.gz)
          cp -r bin/packages/x86_64/custom_feed deploy/packages/noarch
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages

