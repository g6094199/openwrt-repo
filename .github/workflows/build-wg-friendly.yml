Hier ist die detaillierte Erklärung der Änderungen für beide Dateien, aufgeteilt nach den betroffenen Zeilenbereichen, damit du genau nachvollziehen kannst, was korrigiert wurde.
1. Änderungen in der GitHub Action (build-wg-friendly.yml)
Zeilen 25–26: API-Abfrage für den Commit-Hash

    Vorher: LATEST_HASH=$(curl -s https://github.com | jq -r '.sha')
    Nachher: LATEST_HASH=$(curl -s https://github.com | jq -r '.sha')
    Erklärung: Die alte Zeile hat versucht, den HTML-Quelltext der normalen GitHub-Startseite herunterzuladen. Ein HTML-Dokument hat jedoch keine JSON-Struktur und besitzt kein Feld namens .sha. Das führte zu einem Absturz von jq. Die neue Zeile ruft die offizielle GitHub REST-API für das spezifische wg-friendly-Repository ab. Diese API liefert ein sauberes JSON-Objekt zurück, aus dem der 40-stellige Commit-Hash des main-Branches ausgelesen werden kann.

Zeilen 29–32: Sicherheitsprüfung (Neu hinzugefügt)

    Code:
    bash

    if [ "$LATEST_HASH" = "null" ] || [ -z "$LATEST_HASH" ]; then
      echo "Fehler: Konnte Commit-Hash nicht von der GitHub API abrufen!"
      exit 1
    fi

    Verwende Code mit Vorsicht.
    Erklärung: Falls GitHub temporär überlastet ist, ein Rate-Limit greift oder das Quell-Repository umbenannt wird, fängt diese Bedingung den Fehler ab. Sie bricht die Pipeline sofort kontrolliert ab, anstatt mit einem leeren Wert in den Compiler zu laufen.

Zeile 35: Dynamischer Suchen-und-Ersetzen-Befehl (sed)

    Vorher: sed -i "s/PKG_SOURCE_VERSION:=.*/PKG_SOURCE_VERSION:=$LATEST_HASH/" net/wg-friendly/Makefile
    Nachher: sed -i "s/PKG_SOURCE_VERSION:=PLACEHOLDER/PKG_SOURCE_VERSION:=$LATEST_HASH/" net/wg-friendly/Makefile
    Erklärung: Zuvor hat der reguläre Ausdruck .* blind alles nach dem Gleichheitszeichen überschrieben. Da im Makefile dort main stand, hat das zwar funktioniert, war aber fehleranfällig, falls die Variable an anderer Stelle im Text vorkam. Jetzt sucht der Befehl gezielt nach dem eindeutigen Wort PLACEHOLDER und ersetzt nur dieses durch den echten langen Commit-Hash (z. B. d6b2c2f6...).

2. Änderungen im OpenWrt-Makefile (net/wg-friendly/Makefile)
Zeile 10: Die korrekte Quellcode-Repository-URL

    Vorher: PKG_SOURCE_URL:=https://github.com
    Nachher: PKG_SOURCE_URL:=https://github.com
    Erklärung: Das war die Hauptursache für den Abbruch des OpenWrt-Download-Systems. Ohne den exakten Pfad zum spezifischen Git-Repository wusste das SDK nicht, welchen Quellcode es klonen soll, und brach mit dem Fehler 404 Not Found ab.

Zeile 12: Definition des Platzhalters

    Vorher: PKG_SOURCE_VERSION:=main
    Nachher: PKG_SOURCE_VERSION:=PLACEHOLDER
    Erklärung: Hier wurde das Wort main durch PLACEHOLDER ersetzt. Das ist der Ankerpunkt für den sed-Befehl aus der GitHub Action. Wenn die GitHub Action läuft, sieht das SDK dieses Wort niemals, da es Sekunden vorher durch den echten, aktuellen Commit-Hash überschrieben wird.

Zeile 25: Plattformunabhängigkeit aktivieren (PKGARCH)

    Vorher: (Zeile existierte nicht)
    Nachher: PKGARCH:=all
    Erklärung: Diese Ergänzung innerhalb des Blocks define Package/wg-friendly ist für deinen Feed essenziell. Da das Tool ein reines Shell-Skript ist, benötigt es keine plattformspezifische Kompilierung für Intel (x86_64), ARM oder MIPS. Mit PKGARCH:=all wird das Paket als universelles noarch.apk gebaut. Das spart extrem viel Speicherplatz auf deinem GitHub-Pages-Feed und verhindert, dass Router mit anderen Prozessorarchitekturen die Installation verweigern.

