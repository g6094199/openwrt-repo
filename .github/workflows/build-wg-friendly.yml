Klasse, dass du die Ursache gefunden hast! Es passiert beim Arbeiten mit Git im Terminal super schnell, dass ein Commit oder Push mal auf der Strecke bleibt oder im falschen Branch landet.
Da der Code nun aktuell ist, wird die GitHub-Pipeline die API fehlerfrei abfragen, das PLACEHOLDER-Wort ersetzen und das Paket sauber für OpenWrt 25.12 bauen.
Sobald der Build durchgelaufen ist und der grüne Haken steht, kannst du deinen neuen Feed wie oben beschrieben auf deinem Router einbinden.
Wenn du bereit bist, können wir als Nächstes ein Template für ein weiteres Paket erstellen oder uns anschauen, wie du die GitHub Pages für den automatischen Download auf dem Router scharf schaltest. Was hast du als Nächstes vor?
