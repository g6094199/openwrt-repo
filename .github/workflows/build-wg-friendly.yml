name: Build and Deploy APK Feed

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write # Wichtig, um in den gh-pages Branch zu schreiben

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Feed
        uses: actions/checkout@v4

      - name: Build with SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-25.12
          FEED_DIR: openwrt_feed_collection
          PACKAGES: wg-friendly

      - name: Prepare Feed Directory
        run: |
          mkdir -p deploy/all
          # Kopiere alle APKs und den Index (packages.adb)
          find bin/packages/ -name "*.apk" -exec cp {} deploy/all/ \;
          find bin/packages/ -name "packages.adb" -exec cp {} deploy/all/ \;
          # Erstelle eine einfache index.html, damit die Seite nicht leer ist
          echo "<h1>OpenWrt Feed Collection</h1>" > deploy/index.html
          echo "<p>Letztes Update: $(date)</p>" >> deploy/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          force_orphan: true # Erstellt einen sauberen Branch ohne Git-Historie
